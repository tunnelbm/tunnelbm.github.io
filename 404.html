<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #000000;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            /* Your logo goes here - adjust width/height as needed */
            max-width: 200px;
            height: auto;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        .error-message {
            text-align: center;
            font-size: 24px;
            color: #333;
        }

        .error-message a {
            color: #0066cc;
            text-decoration: none;
        }

        .error-message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <div class="container">
        <div class="error-message">
            <p>Oops! We can't find this page. Press <a href="https://benmaskell.co.uk">here</a> to go to home.</p>
        </div>
    </div>
</body>
</html>
